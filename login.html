<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumina AI — Sign In</title>
<!-- Typography (self-hosted, see /fonts) -->
<link rel="stylesheet" href="fonts/fonts.css">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="auth.js"></script>

<script>
// ── Load config from server (.env) — ไม่ต้อง hardcode ────────────────
let GOOGLE_CLIENT_ID = '';
async function loadConfig() {
  try {
    const res  = await fetch('/api/config');
    const cfg  = await res.json();
    GOOGLE_CLIENT_ID = cfg.googleClientId || '';
    if (cfg.ngrokUrl) localStorage.setItem('lumina_ngrok_override', cfg.ngrokUrl);
    initGoogleLogin();
  } catch(e) {
    showStatus('ไม่สามารถโหลด config จาก server ได้', 'error');
  }
}

let _tokenClient = null;

function initGoogleLogin() {
  if (!GOOGLE_CLIENT_ID || GOOGLE_CLIENT_ID.startsWith('YOUR_')) {
    document.getElementById('configWarn').style.display = 'block';
    showStatus('ตั้งค่า GOOGLE_CLIENT_ID ใน .env ก่อน', 'error');
    return;
  }

  // ใช้ OAuth2 Token Client — เปิด popup account picker จริงๆ ทุก browser
  _tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: 'openid profile email',
    callback: handleTokenResponse,
  });

  document.getElementById('configWarn').style.display = 'none';
}
</script>

<style>
:root {
  --ink:    #0a0a0f;
  --glass:  rgba(255,255,255,0.042);
  --rim:    rgba(255,255,255,0.08);
  --text:   #f0eff8;
  --muted:  rgba(240,239,248,0.45);
  --acc:    #7c6bfa;
  --acc2:   #e879f9;
  --mono:   'JetBrains Mono', monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}

body {
  font-family:'DM Sans',sans-serif;
  background: var(--ink);
  color: var(--text);
  display: flex; align-items: center; justify-content: center;
}

/* ── Animated mesh background ───────────────────────────── */
.bg {
  position:fixed; inset:0; z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(124,107,250,0.18) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 80% 90%, rgba(232,121,249,0.12) 0%, transparent 55%),
    radial-gradient(ellipse 50% 50% at 50% 50%, rgba(10,10,15,1) 0%, transparent 100%);
}

/* Subtle grid lines */
.bg::before {
  content:'';
  position:absolute; inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
  background-size: 48px 48px;
  mask-image: radial-gradient(ellipse 90% 80% at 50% 50%, black 30%, transparent 80%);
}

/* Floating orbs */
.orb {
  position:fixed; border-radius:50%; filter:blur(80px); pointer-events:none;
  animation: drift linear infinite;
}
.orb-1{width:400px;height:400px;top:-10%;left:-5%;
  background:radial-gradient(circle,rgba(124,107,250,0.22),transparent 70%);
  animation-duration:28s;}
.orb-2{width:500px;height:500px;bottom:-15%;right:-10%;
  background:radial-gradient(circle,rgba(232,121,249,0.15),transparent 70%);
  animation-duration:35s;animation-direction:reverse;}
.orb-3{width:300px;height:300px;top:40%;left:60%;
  background:radial-gradient(circle,rgba(99,179,237,0.1),transparent 70%);
  animation-duration:22s;animation-delay:-8s;}
@keyframes drift{
  0%{transform:translate(0,0) scale(1)}
  33%{transform:translate(40px,-30px) scale(1.05)}
  66%{transform:translate(-30px,50px) scale(0.95)}
  100%{transform:translate(0,0) scale(1)}
}

/* ── Login card ─────────────────────────────────────────── */
.card {
  position: relative; z-index: 1;
  width: min(440px, 92vw);
  background: var(--glass);
  border: 1px solid var(--rim);
  border-radius: 24px;
  padding: 48px 44px 40px;
  backdrop-filter: blur(28px) saturate(1.6);
  box-shadow:
    0 0 0 1px rgba(124,107,250,0.12),
    0 32px 80px rgba(0,0,0,0.55),
    inset 0 1px 0 rgba(255,255,255,0.07);
  animation: cardIn 0.7s cubic-bezier(0.16,1,0.3,1) both;
}
@keyframes cardIn{
  from{opacity:0;transform:translateY(32px) scale(0.97)}
  to{opacity:1;transform:none}
}

/* Logo */
.logo-row {
  display:flex; align-items:center; gap:14px; margin-bottom:36px;
}
.logo-mark {
  width:44px; height:44px; border-radius:12px; flex-shrink:0;
  background: linear-gradient(135deg, var(--acc) 0%, var(--acc2) 100%);
  display:flex; align-items:center; justify-content:center;
  box-shadow: 0 0 24px rgba(124,107,250,0.4);
  position:relative; overflow:hidden;
}
.logo-mark::after{
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.2),transparent 60%);
}
.logo-mark svg{width:22px;height:22px;fill:white;position:relative;z-index:1;}
.logo-wordmark{display:flex;flex-direction:column;gap:1px;}
.logo-name{font-family:'DM Serif Display',serif;font-size:22px;letter-spacing:-0.02em;line-height:1;}
.logo-tag{font-size:11px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;font-family:var(--mono);}

/* Headline */
.headline{
  font-family:'DM Serif Display',serif;
  font-size:clamp(26px,5vw,34px);
  line-height:1.15; letter-spacing:-0.03em;
  margin-bottom:10px;
}
.headline em{
  font-style:italic;
  background:linear-gradient(90deg,var(--acc),var(--acc2));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
.sub{
  font-size:14px; color:var(--muted); line-height:1.6;
  margin-bottom:36px;
}

/* Divider */
.divider{
  display:flex; align-items:center; gap:12px;
  color:rgba(255,255,255,0.2); font-size:12px;
  font-family:var(--mono); letter-spacing:0.08em;
  margin-bottom:24px;
}
.divider::before,.divider::after{
  content:''; flex:1; height:1px;
  background:rgba(255,255,255,0.08);
}

/* Google button */
#googleSignIn {
  width:100%;
}
/* Override Google's default button with our own styled one */
.gsi-btn {
  display:flex; align-items:center; justify-content:center; gap:12px;
  width:100%; padding:14px 20px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius:12px;
  color: var(--text);
  font-family:'DM Sans',sans-serif;
  font-size:15px; font-weight:500;
  cursor:pointer;
  transition: all 0.2s ease;
  text-decoration:none;
  position:relative; overflow:hidden;
}
.gsi-btn::before{
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.06),transparent);
  opacity:0; transition:opacity 0.2s;
}
.gsi-btn:hover{
  background:rgba(255,255,255,0.1);
  border-color:rgba(255,255,255,0.2);
  transform:translateY(-1px);
  box-shadow:0 8px 24px rgba(0,0,0,0.3);
}
.gsi-btn:hover::before{opacity:1;}
.gsi-btn:active{transform:none;}
.gsi-btn svg{width:20px;height:20px;flex-shrink:0;}

/* Loading state */
.gsi-btn.loading{
  opacity:0.6; pointer-events:none;
}
.gsi-btn.loading .btn-label::after{
  content:'...'; animation:dots 1s infinite;
}
@keyframes dots{
  0%{content:''}33%{content:'.'}66%{content:'..'}100%{content:'...'}
}

/* Hidden Google One Tap container (we use our custom button) */
#g_id_onload{display:none;}

/* Status message */
.status{
  margin-top:16px; padding:12px 16px; border-radius:8px;
  font-size:13px; text-align:center; display:none;
}
.status.error{
  background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.25); color:#fca5a5;
}
.status.info{
  background:rgba(124,107,250,0.1); border:1px solid rgba(124,107,250,0.25); color:#c4bbff;
}

/* Footer note */
.footer-note{
  margin-top:28px; text-align:center;
  font-size:11.5px; color:rgba(255,255,255,0.2);
  line-height:1.6;
  font-family:var(--mono);
}
.footer-note a{color:rgba(124,107,250,0.7); text-decoration:none;}
.footer-note a:hover{color:var(--acc);}

/* Config warning banner */
.config-warn{
  position:fixed; top:20px; left:50%; transform:translateX(-50%);
  background:rgba(251,191,36,0.12); border:1px solid rgba(251,191,36,0.3);
  border-radius:10px; padding:10px 20px;
  font-size:12.5px; color:#fde68a; font-family:var(--mono);
  z-index:100; white-space:nowrap; display:none;
}

/* Shimmer effect on card top border */
.card::before{
  content:''; position:absolute; inset:0; border-radius:24px; pointer-events:none;
  background:linear-gradient(90deg,transparent 0%,rgba(124,107,250,0.3) 50%,transparent 100%);
  mask-image:linear-gradient(black,transparent 3px,transparent calc(100% - 3px),black);
  -webkit-mask-image:linear-gradient(black,transparent 3px,transparent calc(100% - 3px),black);
  animation:shimmer 4s linear infinite;
  background-size:200% 100%;
}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}

</style>
</head>
<body>

<div class="bg"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<!-- Config warning (shows when Client ID not set) -->
<div class="config-warn" id="configWarn">
  ⚠ ไม่สามารถโหลด config ได้ — ตรวจสอบว่า server.js รันอยู่
</div>

<div class="card">

  <!-- Logo -->
  <div class="logo-row">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </div>
    <div class="logo-wordmark">
      <span class="logo-name">LuminaAI</span>
      <span class="logo-tag">Intelligent Platform</span>
    </div>
  </div>

  <!-- Headline -->
  <h1 class="headline">Think deeper,<br><em>build faster.</em></h1>
  <p class="sub">เข้าสู่ระบบเพื่อเริ่มต้นใช้งาน Lumina AI<br>ระบบ AI ที่คิดและสร้างสิ่งใหม่ร่วมกับคุณ</p>

  <!-- Divider -->
  <div class="divider">sign in to continue</div>

  <!-- Custom styled Google button -->
  <button class="gsi-btn" id="gsiBtn" onclick="startGoogleSignIn()">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    <span class="btn-label">Continue with Google</span>
  </button>

  <div class="status" id="statusMsg"></div>

  <!-- Footer -->
  <div class="footer-note">
    การเข้าสู่ระบบแสดงว่าคุณยอมรับ
    <a href="#">Terms of Service</a> และ <a href="#">Privacy Policy</a>
  </div>

</div>

<script>
// ── Check if already logged in → go straight to chatbot ─────────────────
window.addEventListener('DOMContentLoaded', () => {
  if (LuminaAuth.isLoggedIn()) {
    window.location.href = '/app';
    return;
  }
  // Load Client ID from server .env automatically
  loadConfig();
});

// ── Handle OAuth2 token response (ใช้แทน One Tap) ───────────────────────
async function handleTokenResponse(tokenResponse) {
  if (tokenResponse.error || !tokenResponse.access_token) {
    showStatus('การเข้าสู่ระบบล้มเหลว: ' + (tokenResponse.error || 'ไม่ได้รับ token'), 'error');
    resetBtn();
    return;
  }

  try {
    // ดึงข้อมูล user จาก Google API
    const userInfo = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
      headers: { Authorization: 'Bearer ' + tokenResponse.access_token }
    }).then(r => r.json());

    if (!userInfo.sub) throw new Error('ข้อมูล user ไม่สมบูรณ์');

    // บันทึก session ลง localStorage (compatible กับ auth.js)
    const session = {
      name:    userInfo.name    || 'User',
      email:   userInfo.email   || '',
      picture: userInfo.picture || '',
      sub:     userInfo.sub,
      token:   tokenResponse.access_token,
      exp:     Math.floor(Date.now() / 1000) + (tokenResponse.expires_in || 3600),
      loginAt: Date.now(),
    };
    localStorage.setItem('lumina_user_session', JSON.stringify(session));

    showStatus('เข้าสู่ระบบสำเร็จ กำลังโหลด…', 'info');
    setTimeout(() => { window.location.href = '/app'; }, 700);

  } catch (e) {
    showStatus('ดึงข้อมูลบัญชีล้มเหลว: ' + e.message, 'error');
    resetBtn();
  }
}

// ── Trigger Google account picker popup ─────────────────────────────────
function startGoogleSignIn() {
  const btn = document.getElementById('gsiBtn');
  btn.classList.add('loading');

  if (!_tokenClient) {
    showStatus('กำลังโหลด config...', 'info');
    btn.classList.remove('loading');
    return;
  }

  // prompt: 'select_account' = บังคับให้เลือก account เสมอ (ทุก browser)
  _tokenClient.requestAccessToken({ prompt: 'select_account' });
  setTimeout(() => btn.classList.remove('loading'), 1200);
}

function showStatus(msg, type) {
  const el = document.getElementById('statusMsg');
  el.textContent = msg;
  el.className = 'status ' + type;
  el.style.display = 'block';
}
function resetBtn() {
  document.getElementById('gsiBtn').classList.remove('loading');
}
</script>
</body>
</html>
