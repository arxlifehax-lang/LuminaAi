<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Cosmic Flow Landscape</title>
<style>:root{--accent:#a78bfa;--bg:#07050f;--text:#e2e8f0;}body{background:var(--bg);color:var(--text);margin:0;overflow:hidden;height:100vh;display:flex;align-items:center;justify-content:center;font-family:sans-serif;}
canvas{position:absolute;top:0;left:0;width:100%;height:100%;}.overlay{position:absolute;bottom:30px;left:30px;background:rgba(13,11,26,0.7);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:20px;width:280px;z-index:10;}
h2{font-size:16px;margin:0 0 6px 0;background:linear-gradient(135deg,#a78bfa,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}</style>
</head><body><canvas id="c"></canvas><div class="overlay"><h2>Cosmic Flow Real Backend</h2><p style="font-size:11px;color:#94a3b8;margin:0;">Compiled via python orchestrator</p></div>
<script>const c=document.getElementById('c'),x=c.getContext('2d');let w=c.width=innerWidth,h=c.height=innerHeight,s=[];for(let i=0;i<300;i++)s.push({x:Math.random()*w,y:Math.random()*h,z:Math.random()*2,v:Math.random()*2+.5});
function d(){x.fillStyle='#07050f';x.fillRect(0,0,w,h);x.fillStyle='#a78bfa';s.forEach(p=>{x.beginPath();x.arc(p.x,p.y,p.z,0,Math.PI*2);x.fill();p.x-=p.v;if(p.x<0)p.x=w;});requestAnimationFrame(d);}d();</script></body></html>
